<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savege Smp— Premium Minecraft Server</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#030508;--bg2:#080c14;--surface:#101828;--surface2:#162035;--border:#1e2d4a;--border2:#253856;--accent:#00d4ff;--green:#00ff88;--purple:#9d5cff;--orange:#ff8c00;--red:#ff3355;--gold:#ffd700;--text:#e8f4ff;--text2:#8ba3c4;--text3:#4a6a8a}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:#0099cc;border-radius:3px}
.stars-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 20% 50%,rgba(0,100,180,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(80,0,160,.06) 0%,transparent 50%)}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.03;background-image:linear-gradient(var(--accent) 1px,transparent 1px),linear-gradient(90deg,var(--accent) 1px,transparent 1px);background-size:60px 60px}
/* Announcement bar */
.ann-bar{position:relative;z-index:100;background:linear-gradient(90deg,#001a33,#00101f,#001a33);border-bottom:1px solid var(--border);overflow:hidden;height:36px;display:flex;align-items:center}
.ann-bar::before,.ann-bar::after{content:'';position:absolute;top:0;width:80px;height:100%;z-index:2}
.ann-bar::before{left:0;background:linear-gradient(90deg,#001a33,transparent)}
.ann-bar::after{right:0;background:linear-gradient(-90deg,#001a33,transparent)}
.ticker-wrap{overflow:hidden;white-space:nowrap;flex:1}
.ticker-track{display:inline-block;animation:ticker 40s linear infinite}
.ticker-item{display:inline-block;padding:0 40px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:.5px}
.ticker-item span{color:var(--gold);margin-right:8px}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
/* Nav */
nav{position:sticky;top:0;z-index:99;background:rgba(3,5,8,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:12px;cursor:pointer}
.logo-hex{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--purple));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--accent);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 20px var(--accent)}50%{box-shadow:0 0 35px var(--accent)}}
.logo-text{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px}
.logo-text span{color:var(--accent)}
.nav-links{display:flex;gap:4px}
.nav-link{padding:8px 14px;color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;border-radius:6px;transition:all .2s;text-transform:uppercase;letter-spacing:1px;border:1px solid transparent;background:none}
.nav-link:hover,.nav-link.active{color:var(--accent);background:rgba(0,212,255,.05);border-color:var(--border2)}
.nav-actions{display:flex;gap:8px;align-items:center}
.btn{padding:8px 18px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .25s;border:none;text-transform:uppercase}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);border-color:var(--accent);background:rgba(0,212,255,.05)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0099cc);color:#000;font-weight:700}
.btn-primary:hover{box-shadow:0 0 20px rgba(0,212,255,.4);transform:translateY(-1px)}
.btn-green{background:linear-gradient(135deg,var(--green),#00cc66);color:#000}
.btn-green:hover{box-shadow:0 0 20px rgba(0,255,136,.4)}
.btn-danger{background:linear-gradient(135deg,var(--red),#cc0033);color:#fff}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px}
.cart-btn{position:relative}
.cart-badge{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center}
/* Pages */
.page{display:none;position:relative;z-index:1;min-height:calc(100vh - 100px)}
.page.active{display:block}
/* Hero */
.hero{min-height:88vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:60px 32px}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center top,rgba(0,212,255,.07) 0%,transparent 60%)}
.hero-particles{position:absolute;inset:0;overflow:hidden}
.particle{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;animation:float linear infinite;opacity:0}
@keyframes float{0%{transform:translateY(100vh);opacity:0}10%{opacity:.6}90%{opacity:.6}100%{transform:translateY(-100px);opacity:0}}
.hero-content{text-align:center;max-width:800px;position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 18px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:20px;font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;font-family:'Share Tech Mono',monospace;animation:fsd .7s ease both}
.hero-badge .dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes fsd{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.hero-title{font-family:'Orbitron',sans-serif;font-size:clamp(40px,7vw,78px);font-weight:900;line-height:1.1;margin-bottom:18px;animation:fsd .7s .1s ease both}
.hero-title .line1{display:block;color:var(--text)}
.hero-title .line2{display:block;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:17px;color:var(--text2);margin-bottom:36px;line-height:1.7;animation:fsd .7s .2s ease both}
.hero-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;animation:fsd .7s .3s ease both}
.btn-hero{padding:14px 32px;font-size:15px;border-radius:8px}
.hero-ip{margin-top:36px;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text3);animation:fsd .7s .4s ease both}
.hero-ip span{color:var(--accent);letter-spacing:2px}
/* Stats bar */
.stats-bar{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;justify-content:center}
.stat-item{display:flex;flex-direction:column;align-items:center;padding:0 40px;border-right:1px solid var(--border)}
.stat-item:last-child{border-right:none}
.stat-val{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
/* Section */
.section{padding:70px 32px;max-width:1400px;margin:0 auto}
.section-header{text-align:center;margin-bottom:56px}
.section-tag{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.section-title{font-family:'Orbitron',sans-serif;font-size:clamp(26px,4vw,42px);font-weight:700}
.section-title span{color:var(--accent)}
.section-sub{color:var(--text2);font-size:15px;margin-top:10px}
/* Store */
.store-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:36px;flex-wrap:wrap}
.store-tab{padding:10px 22px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;transition:all .2s;font-family:'Rajdhani',sans-serif}
.store-tab.active,.store-tab:hover{background:rgba(0,212,255,.1);color:var(--accent);border-color:var(--accent)}
.ranks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:26px 22px;position:relative;overflow:hidden;transition:all .3s;display:flex;flex-direction:column;gap:14px}
.rank-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--rcolor,var(--accent));box-shadow:0 0 12px var(--rcolor,var(--accent))}
.rank-card:hover{transform:translateY(-5px);border-color:var(--rcolor,var(--accent));box-shadow:0 8px 36px rgba(0,0,0,.4)}
.rank-card.featured::after{content:'BEST VALUE';position:absolute;top:14px;right:-20px;background:var(--gold);color:#000;font-size:9px;font-weight:900;padding:3px 28px;transform:rotate(45deg);letter-spacing:1px}
.rank-icon{width:60px;height:60px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);overflow:hidden;flex-shrink:0}
.rank-icon img{width:100%;height:100%;object-fit:cover}
.rank-name{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:700;color:var(--rcolor,var(--text))}
.rank-desc{font-size:12px;color:var(--text3);line-height:1.5}
.rank-perks{display:flex;flex-direction:column;gap:5px;flex:1}
.rank-perk{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.rank-perk::before{content:'◆';color:var(--rcolor,var(--accent));font-size:7px;flex-shrink:0}
.rank-price{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700}
.rank-price small{font-size:13px;color:var(--text3);font-family:'Rajdhani',sans-serif}
.rank-btn{width:100%;padding:10px;border-radius:7px;border:1px solid var(--rcolor,var(--accent));background:transparent;color:var(--rcolor,var(--accent));font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.rank-btn:hover:not(:disabled){background:var(--rcolor,var(--accent));color:#000}
.rank-btn:disabled{opacity:.55;cursor:not-allowed}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:10px;transition:all .2s}
.item-card:hover{border-color:var(--accent);transform:translateY(-3px)}
.item-emoji{font-size:34px}
.item-name{font-weight:700;font-size:15px}
.item-desc{font-size:12px;color:var(--text3);line-height:1.4;flex:1}
.item-price{font-family:'Orbitron',sans-serif;font-size:19px;font-weight:700;color:var(--green)}
.item-stock{font-size:11px;color:var(--text3)}
/* Cart sidebar */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-sidebar{position:fixed;right:0;top:0;bottom:0;width:min(410px,100vw);z-index:201;background:var(--bg2);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.cart-sidebar.open{transform:translateX(0)}
.cart-header{padding:22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700}
.cart-close{background:none;border:none;color:var(--text2);font-size:26px;cursor:pointer;line-height:1;padding:0}
.cart-items-list{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px}
.cart-item{display:flex;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px}
.cart-item-info{flex:1}
.cart-item-name{font-weight:700;font-size:14px;margin-bottom:5px}
.cart-item-price{font-size:13px;color:var(--green);font-family:'Orbitron',sans-serif}
.cart-item-remove{background:none;border:none;color:var(--red);cursor:pointer;font-size:20px;align-self:flex-start;padding:0;line-height:1}
.cart-footer{padding:18px;border-top:1px solid var(--border)}
.discount-row{display:flex;gap:8px;margin-bottom:10px}
.discount-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px}
.discount-input:focus{outline:none;border-color:var(--accent)}
.discount-msg{font-size:12px;margin-top:4px;margin-bottom:10px;min-height:16px}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cart-total-val{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:700}
.cart-empty{text-align:center;padding:60px 20px;color:var(--text3)}
.cart-empty-icon{font-size:44px;margin-bottom:14px}
/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:min(540px,100%);max-height:90vh;overflow-y:auto}
.modal-header{padding:22px 26px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:700}
.modal-body{padding:26px}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:7px;letter-spacing:.5px;text-transform:uppercase}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 15px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--accent);background:var(--surface2)}
.form-input::placeholder{color:var(--text3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* Auth tabs */
.auth-tabs{display:flex;border-bottom:1px solid var(--border)}
.auth-tab{flex:1;padding:15px;text-align:center;cursor:pointer;font-weight:700;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-form{padding:26px;display:none}
.auth-form.active{display:block}
/* Alerts */
.alert{padding:11px 15px;border-radius:8px;font-size:13px;margin-bottom:14px;font-weight:600}
.alert-error{background:rgba(255,51,85,.1);border:1px solid rgba(255,51,85,.3);color:var(--red)}
.alert-success{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--green)}
.alert-info{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--accent)}
/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-pending{background:rgba(255,140,0,.2);color:var(--orange);border:1px solid rgba(255,140,0,.3)}
.badge-completed{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.badge-cancelled{background:rgba(255,51,85,.15);color:var(--red);border:1px solid rgba(255,51,85,.3)}
.badge-admin{background:rgba(157,92,255,.2);color:var(--purple);border:1px solid rgba(157,92,255,.3)}
.badge-user{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.2)}
/* Status card */
.status-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;position:relative;overflow:hidden}
.status-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.status-online{color:var(--green)}.status-offline{color:var(--red)}
.sdot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:7px}
.sdot.online{background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 2s ease-in-out infinite}
.sdot.offline{background:var(--red)}
/* Admin */
.admin-layout{display:flex;min-height:calc(100vh - 100px)}
.admin-sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:20px 0}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:12px 22px;color:var(--text2);cursor:pointer;font-size:13px;font-weight:700;letter-spacing:.5px;transition:all .2s;text-transform:uppercase;border-left:3px solid transparent}
.admin-nav-item:hover,.admin-nav-item.active{color:var(--accent);background:rgba(0,212,255,.05);border-left-color:var(--accent)}
.admin-content{flex:1;padding:36px;overflow-y:auto}
.admin-title{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;margin-bottom:26px}
.admin-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:26px}
.astat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.astat-icon{font-size:22px;margin-bottom:6px}
.astat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.astat-val{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:700;color:var(--accent)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:auto}
.dtable{width:100%;border-collapse:collapse}
.dtable th{text-align:left;padding:11px 14px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--surface)}
.dtable td{padding:13px 14px;font-size:13px;border-bottom:1px solid rgba(30,45,74,.4);vertical-align:middle}
.dtable tr:hover td{background:rgba(0,212,255,.02)}
.aform-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px}
.aform-title{font-weight:700;font-size:15px;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.color-swatches{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.cswatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.cswatch:hover,.cswatch.sel{border-color:#fff}
/* About / Contact */
.about-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px;margin-top:36px}
.about-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:26px}
.about-card-icon{font-size:38px;margin-bottom:14px}
.about-card-title{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;margin-bottom:8px}
.about-card-text{font-size:13px;color:var(--text2);line-height:1.6}
/* Orders */
.orders-list{display:flex;flex-direction:column;gap:14px}
.order-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.order-id{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text3)}
.order-date{font-size:11px;color:var(--text3)}
.order-item-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.order-total-row{border-top:1px solid var(--border);margin-top:10px;padding-top:10px;display:flex;justify-content:space-between;font-weight:700}
/* Profile */
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:30px;margin-bottom:18px}
.profile-avatar{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;col
